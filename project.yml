name: VaultyShot
options:
  bundleIdPrefix: com.nelahian
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.2"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  VaultyShot:
    type: application
    platform: macOS
    sources:
      - VaultyShot
    info:
      path: VaultyShot/Info.plist
      properties:
        LSUIElement: true
    entitlements:
      path: VaultyShot/VaultyShot.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        PRODUCT_BUNDLE_IDENTIFIER: com.nelahian.vaultyshot
        INFOPLIST_FILE: VaultyShot/Info.plist
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
    frameworks:
      - sdk: QuickLookThumbnailing.framework
